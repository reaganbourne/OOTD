name: API CI

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    name: Auth tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ootd
          POSTGRES_PASSWORD: ootd
          POSTGRES_DB: ootd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ootd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: services/api

    env:
      DATABASE_URL: postgresql://ootd:ootd@localhost:5432/ootd_test
      TEST_DATABASE_URL: postgresql://ootd:ootd@localhost:5432/ootd_test
      SECRET_KEY: ci-secret-not-used-in-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/api/requirements.txt
            services/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v
